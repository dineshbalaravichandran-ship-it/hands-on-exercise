<h1>{{ portalName }}</h1>
<p>Browse courses, track your grades, and manage your enrollments all in one place.</p>

<div class="stats-row">
  <div class="stat"><strong>{{ coursesAvailable }}</strong><span>Courses Available</span></div>
  <div class="stat"><strong>{{ enrolled }}</strong><span>Enrolled</span></div>
  <div class="stat"><strong>{{ gpa }}</strong><span>GPA</span></div>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p *ngIf="message">{{ message }}</p>

<div class="search-box">
  <input type="text" [(ngModel)]="searchTerm" placeholder="Search courses..." />
  <p>Searching for: {{ searchTerm }}</p>
</div>

<app-course-summary-widget></app-course-summary-widget>
<app-notification></app-notification>
