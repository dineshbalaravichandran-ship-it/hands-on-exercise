server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        # "native" profile serves config files bundled inside this jar
        # (src/main/resources/config-repo) — no Git server required.
        native:
          search-locations: classpath:/config-repo
  profiles:
    active: native

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
