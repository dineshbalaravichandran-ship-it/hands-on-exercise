server:
  port: 8082

spring:
  application:
    name: order-service

  # ---- Default: H2 in-memory ----
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ---- MySQL alternative ----
  # datasource:
  #   url: jdbc:mysql://localhost:3306/orderdb?createDatabaseIfNotExist=true
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   database-platform: org.hibernate.dialect.MySQLDialect

# Base URL of the User Service (used by both the Feign client and WebClient)
user-service:
  url: http://localhost:8081

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
