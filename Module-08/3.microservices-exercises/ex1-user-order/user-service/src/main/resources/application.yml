server:
  port: 8081

spring:
  application:
    name: user-service

  # ---- Default: H2 in-memory (works out of the box, no setup needed) ----
  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ---- To use MySQL instead, comment the H2 block above and uncomment below ----
  # datasource:
  #   url: jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   database-platform: org.hibernate.dialect.MySQLDialect
  #   show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
