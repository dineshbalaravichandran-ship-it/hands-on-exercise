spring.application.name=edge-service-routing-filtering
server.port=8080

# Route: any request to /example/** is forwarded to http://example.org
spring.cloud.gateway.routes[0].id=example_route
spring.cloud.gateway.routes[0].uri=http://example.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.example.edgeservice=INFO
