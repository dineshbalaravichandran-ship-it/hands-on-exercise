spring.application.name=load-balancing-gateway
server.port=8081

# Route: any request to /loadbalanced/** is load-balanced across the
# "example-service" instances defined below.
spring.cloud.gateway.routes[0].id=load_balanced_route
spring.cloud.gateway.routes[0].uri=lb://example-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/loadbalanced/**

# Static list of "example-service" instances, resolved via Spring Cloud's
# SimpleDiscoveryClient (no external Eureka/Consul server required for
# this exercise). Requests will be randomly distributed across these two
# instances by the RandomLoadBalancer bean.
spring.cloud.discovery.client.simple.instances.example-service[0].uri=http://localhost:9001
spring.cloud.discovery.client.simple.instances.example-service[1].uri=http://localhost:9002

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG
